        var currentPath = '/';

        var FOLDER_SVG = '<svg width="1.5em" height="1em" version="1.1" viewBox="0 0 317 259"><use xlink:href="#folder"></use></svg>';
        var FILE_SVG = '<svg width="1.2em" height="1em" version="1.1" viewBox="0 0 265 323" style="vertical-align:middle;margin-right:4px"><g stroke="#000" stroke-width="25" fill="#FFF" fill-rule="evenodd" stroke-linecap="round" stroke-linejoin="round"><path d="M13 24.12v274.76c0 6.16 5.87 11.12 13.17 11.12H239c7.3 0 13.17-4.96 13.17-11.12V136.15S132.6 13 128.37 13H26.17C18.87 13 13 17.96 13 24.12z"/><path d="M129.37 13L129 113.9c0 10.58 7.26 19.1 16.27 19.1H249L129.37 13z"/></g></svg>';

        function getAllFiles(path) {
            var result = [];
            var page = pages[path] || {dirs: [], files: []};
            page.files.forEach(function(f) { result.push(path + f); });
            page.dirs.forEach(function(d) {
                getAllFiles(path + d + '/').forEach(function(fp) { result.push(fp); });
            });
            return result;
        }

        function downloadFolder(folderPath, folderName) {
            var allFiles = getAllFiles(folderPath);
            var zip = new JSZip();
            var fetches = allFiles.map(function(filePath) {
                var relativePath = filePath.slice(folderPath.length);
                return fetch(filePath).then(function(r) {
                    if (!r.ok) throw new Error('Failed: ' + filePath);
                    return r.arrayBuffer();
                }).then(function(buf) {
                    zip.file(relativePath, buf);
                });
            });
            Promise.all(fetches).then(function() {
                return zip.generateAsync({type: 'blob'});
            }).then(function(blob) {
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = folderName + '.zip';
                a.click();
            }).catch(function(err) {
                alert('Download failed: ' + err.message);
            });
        }

        function navigate(dir) {
            if (dir === '..') {
                var parts = currentPath.replace(/\/$/, '').split('/').filter(Boolean);
                parts.pop();
                currentPath = '/' + parts.join('/') + (parts.length ? '/' : '');
            } else {
                currentPath = currentPath + dir + '/';
            }
            document.getElementById('filter').value = '';
            render();
        }

        function goTo(path) {
            currentPath = path;
            document.getElementById('filter').value = '';
            render();
        }

        function render() {
            var page = pages[currentPath] || {dirs: [], files: []};
            var dirs = page.dirs;
            var files = page.files;

            document.getElementById('dir-count').textContent = dirs.length;
            document.getElementById('file-count').textContent = files.length;

            var parts = currentPath.split('/').filter(Boolean);
            var bc = '<a href="#" onclick="goTo(\'/\'); return false;">/</a>';
            var acc = '/';
            parts.forEach(function(p) {
                acc += p + '/';
                var cap = acc;
                bc += '<a href="#" onclick="goTo(\'' + cap + '\'); return false;">' + p + '</a>/';
            });
            document.getElementById('breadcrumb').innerHTML = bc;

            var tbody = document.getElementById('file-list');
            tbody.innerHTML = '';

            if (currentPath !== '/') {
                var upRow = document.createElement('tr');
                upRow.className = 'file';
                upRow.innerHTML = '<td></td><td><a href="#" onclick="navigate(\'..\'); return false;">' + FOLDER_SVG + '<span class="goup">..</span></a></td><td>—</td>';
                tbody.appendChild(upRow);
            }

            dirs.forEach(function(d) {
                var tr = document.createElement('tr');
                tr.className = 'file';
                var fp = currentPath + d + '/';
                tr.innerHTML = '<td></td><td><a href="#" onclick="downloadFolder(\'' + fp + '\', \'' + d + '\'); return false;">' + FOLDER_SVG + '<span class="name">' + d + '/</span></a></td><td data-order="-1">—</td>';
                tbody.appendChild(tr);
            });

            files.forEach(function(f) {
                var tr = document.createElement('tr');
                tr.className = 'file';
                tr.innerHTML = '<td></td><td><a href="' + currentPath + f + '" download>' + FILE_SVG + '<span class="name">' + f + '</span></a></td><td>—</td>';
                tbody.appendChild(tr);
            });
        }

        function filterRows() {
            var q = document.getElementById('filter').value.trim().toLowerCase();
            document.querySelectorAll('tr.file').forEach(function(el) {
                if (!q) { el.style.display = ''; return; }
                var nameEl = el.querySelector('.name, .goup');
                var val = nameEl ? nameEl.textContent.trim().toLowerCase() : '';
                el.style.display = val.indexOf(q) !== -1 ? '' : 'none';
            });
        }
    </script>
